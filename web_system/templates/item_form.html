{% extends "base.html" %}
{% block title %}{{ '编辑物料' if item else '新增物料' }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card card-soft">
      <div class="card-body p-4">
        <h4 class="mb-3">{{ '编辑物料' if item else '新增物料' }}</h4>
        <form method="post" class="row g-3">
          <div class="col-md-12">
            <label class="form-label">分类路径</label>
            <input class="form-control" name="category_path" value="{{ item.category_path if item else '' }}" placeholder="例如：芯片 - STM32 - STM32F103" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">名称</label>
            <input class="form-control" name="name" value="{{ item.name if item else '' }}" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">型号</label>
            <input class="form-control" name="model" value="{{ item.model if item else '' }}">
          </div>
          <div class="col-md-6">
            <label class="form-label">规格</label>
            <input class="form-control" name="spec" value="{{ item.spec if item else '' }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">当前库存</label>
            <input class="form-control" name="quantity" type="number" min="0" value="{{ item.quantity if item else 0 }}" required>
          </div>
          <div class="col-md-3">
            <label class="form-label">单位</label>
            <input class="form-control" name="unit" value="{{ item.unit if item else '个' }}">
          </div>
          <div class="col-md-4">
            <label class="form-label">预警库存</label>
            <input class="form-control" name="min_quantity" type="number" min="0" value="{{ item.min_quantity if item else 0 }}" required>
          </div>
          <div class="col-md-8">
            <label class="form-label">位置</label>
            <input class="form-control" name="location" value="{{ item.location if item else '' }}">
          </div>
          <div class="col-12">
            <label class="form-label">备注</label>
            <textarea class="form-control" name="note" rows="3">{{ item.note if item else '' }}</textarea>
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">保存</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('items') }}">返回</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
